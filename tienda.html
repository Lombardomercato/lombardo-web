<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tienda Lombardo</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">LOMBARDO</a>
      <button class="nav-toggle" aria-label="Abrir menú" aria-expanded="false">MENU</button>
      <nav class="main-nav">
        <a href="index.html">Inicio</a>
        <a href="tienda.html">Tienda</a>
        <a href="vinos.html">Vinos</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section bg-verde tienda-hero">
      <div class="container">
        <p class="eyebrow tienda-eyebrow">Muy pronto</p>
        <h1>Tienda Lombardo</h1>
        <p class="tienda-lead">Una selección curada para llevarte la experiencia Lombardo a tu casa.</p>

        <div class="tienda-grid" aria-label="Categorías de la tienda">
          <article class="tienda-card"><h2>Vinos</h2></article>
          <article class="tienda-card"><h2>Delicatessen</h2></article>
          <article class="tienda-card"><h2>Conservas</h2></article>
          <article class="tienda-card"><h2>Fiambres</h2></article>
          <article class="tienda-card"><h2>Carnes envasadas</h2></article>
          <article class="tienda-card"><h2>Regalos</h2></article>
          <article class="tienda-card"><h2>Experiencias</h2></article>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <small>LOMBARDO · <span data-year></span></small>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
